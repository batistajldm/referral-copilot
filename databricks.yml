bundle:
  name: referral-copilot

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID
  lakebase_branch:
    description: Lakebase branch resource name
  lakebase_database:
    description: Lakebase database resource name
  serving_endpoint_name:
    description: Foundation Model serving endpoint for natural-language query parsing

resources:
  apps:
    app:
      name: "referral-copilot"
      description: "Referral Copilot - evidence-backed healthcare facility recommendations (DAIS for Good 2026)"
      source_code_path: ./
      # Uncomment to enable on behalf of user API scopes. Available scopes: sql, dashboards.genie, files.files, serving.serving-endpoints
      # user_api_scopes:
      #   - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: postgres
          postgres:
            branch: ${var.lakebase_branch}
            database: ${var.lakebase_database}
            permission: CAN_CONNECT_AND_CREATE
        - name: serving-default
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY

targets:
  default:
    default: true
    workspace:
      host: https://dbc-afb03865-3934.cloud.databricks.com

    variables:
      sql_warehouse_id: 36fdbb817fccbd3b
      lakebase_branch: projects/referral-copilot/branches/production
      lakebase_database: projects/referral-copilot/branches/production/databases/databricks-postgres
      serving_endpoint_name: databricks-meta-llama-3-3-70b-instruct
